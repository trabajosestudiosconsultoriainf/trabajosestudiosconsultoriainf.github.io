<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collage de Imágenes</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #6f4f37;
            /* Color marrón */
            overflow: hidden;
            font-family: 'Roboto', sans-serif;
        }

        .collage {
            position: relative;
            width: 150vw;
            height: 150vh;
        }

        .collage img {
            position: absolute;
            max-width: 900px;
            /* Doble de tamaño */
            max-height: 900px;
            /* Doble de tamaño */
            transition: transform 0.3s;
        }

        .collage img:hover {
            transform: scale(1.2);
        }

        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(25, 118, 210, 0.8);
            /* Azul primario de Material UI */
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            z-index: 1;
            /* Asegura que la capa de texto esté sobre las imágenes */
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            color: white;
        }

        .subtitle {
            font-size: 16px;
            color: white;
        }

        .button {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #1976d2;
            /* Azul primario de Material UI */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.2);
            transition: background 0.3s;
        }

        .button:hover {
            background-color: #1565c0;
            /* Un tono más oscuro para el hover */
        }
    </style>
</head>

<body>
    <div class="collage" id="collage">
        <div class="overlay">
            <div class="title">Bienvenido</div>
            <div class="subtitle">Explora nuestra colección de documentos técnicos y personalízalos en línea de forma rápida y sencilla.</div>
            <a href="https://calculadoradeahorroenergetico.duckdns.org/" class="button">Ver más</a>
        </div>
    </div>


    <script>
        const images = [
            'img1.png',
            'img2.png',
            'img3.png',
            'img4.png',
            'img1.png',
            'img2.png',
            'img3.png',
            'img4.png',
            'img1.png',
            'img2.png', 'img4.png',
            'img1.png', 'img4.png',
            'img1.png',
            'img2.png',
            'img3.png',
            'img4.png',
            'img1.png',
            'img2.png', 'img4.png',
            'img1.png',
            'img2.png',            'img3.png',
            'img4.png',
            'img1.png',
            'img2.png', 'img4.png',
            'img1.png', 'img4.png',
            'img1.png',
            'img2.png',
            'img3.png',
            'img4.png',
            'img1.png',
            'img2.png', 'img4.png',
            'img1.png',
            'img2.png',
            'img3.png',
            'img4.png',
            'img1.png',
            'img2.png',

            'img5.png'
        ];

        const collageContainer = document.getElementById("collage");


        images.forEach(src => {
            const img = document.createElement("img");
            img.src = src;
            img.style.left = `${Math.random() * 70 - 10}%`;  // Mueve las imágenes más hacia la izquierda
            img.style.top = `${Math.random() * 70 - 10}%`;   // Mueve las imágenes más hacia arriba
            img.style.transform = `rotate(${Math.random() * 150 - 70}deg)`;  // Rotación entre -80 y 80 grados
            collageContainer.appendChild(img);
        });


    </script>
</body>

</html>
